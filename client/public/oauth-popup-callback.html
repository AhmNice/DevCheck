<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OAuth Callback</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #f5f5f5;
        color: #333;
      }

      .container {
        text-align: center;
        background: white;
        padding: 2rem;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        max-width: 400px;
        width: 90%;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #f3f3f3;
        border-top: 3px solid #4a90e2;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 1rem auto;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      h2 {
        margin: 0 0 0.5rem 0;
        font-size: 1.25rem;
      }

      p {
        margin: 0;
        color: #666;
        font-size: 0.9rem;
      }

      .error {
        color: #d32f2f;
        background: #ffebee;
        padding: 0.75rem;
        border-radius: 4px;
        margin-top: 1rem;
        font-size: 0.9rem;
      }

      .success {
        color: #388e3c;
        background: #e8f5e9;
        padding: 0.75rem;
        border-radius: 4px;
        margin-top: 1rem;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="spinner"></div>
      <h2>Processing authentication...</h2>
      <p>Please wait while we complete authentication.</p>
    </div>

    <script>
      // Parse URL query parameters
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");
      const userId = params.get("user_id");
      const error = params.get("error");
      const errorDescription = params.get("error_description");

      console.log({ token, userId, error, errorDescription });

      // Get the parent window's origin
      const parentOrigin = window.opener
        ? window.opener.location.origin
        : window.location.origin;

      // Function to close window after delay
      function closeWindow(delay = 1500) {
        setTimeout(() => {
          try {
            window.close();
          } catch (e) {
            console.warn("Unable to close window automatically");
          }
        }, delay);
      }

      // Update UI and send message based on state
      function handleResult(success, data = {}) {
        const container = document.querySelector(".container");
        const spinner = document.querySelector(".spinner");
        const titleEl = document.querySelector("h2");
        const paragraph = document.querySelector("p");
        console.log(success, data);
        // Hide spinner
        if (spinner) spinner.style.display = "none";

        if (success) {
          // Success state
          if (titleEl) titleEl.textContent = "Success!";
          if (paragraph)
            paragraph.textContent =
              "Authentication complete. This window will close...";

          const successDiv = document.createElement("div");
          successDiv.className = "success";
          successDiv.textContent = "✓ Authentication successful";
          container.appendChild(successDiv);

          if (window.opener && !window.opener.closed) {
            window.opener.postMessage(
              { success: true, token: data.token, userId: data.userId },
              parentOrigin,
            );
          }
        } else {
          // Error state
          if (titleEl) titleEl.textContent = "Authentication Failed";
          if (paragraph)
            paragraph.textContent = data.message || "Please try again";

          const errorDiv = document.createElement("div");
          errorDiv.className = "error";
          errorDiv.textContent = data.message || "Authentication failed";
          container.appendChild(errorDiv);

          // Send error message to parent
          if (window.opener && !window.opener.closed) {
            console.log("Sending error message to parent:", {
              error: data.error,
              message: data.message,
            });
            window.opener.postMessage(
              {
                success: false,
                token: data.token,
                userId: data.userId,
                error: data.error,
                message: data.message,
              },
              parentOrigin,
            );
          }
        }

        // Always close the window
        closeWindow(200);
      }

      // Determine the state and handle accordingly
      if (error) {
        // Error from OAuth provider
        let errorMsg = errorDescription || error;
        if (error === "google_oauth_error") {
          errorMsg = "Google authentication failed. Please try again.";
        } else if (error === "github_oauth_error") {
          errorMsg = "GitHub authentication failed. Please try again.";
        }

        handleResult(false, {
          error: error,
          message: errorMsg,
        });
      } else if (!token || !userId) {
        // Missing parameters
        const missing = [];
        if (!token) missing.push("token");
        if (!userId) missing.push("user_id");

        handleResult(false, {
          error: "missing_parameters",
          message: `Missing required parameters: ${missing.join(", ")}`,
        });
      } else {
        // Success - all parameters present
        handleResult(true, { token, userId });
      }
    </script>
  </body>
</html>
